<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LucidKeyboard</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div id="root">
      <!-- Always present; the ONLY non-click-through spot while locked -->
      <button id="lockBtn" title="Lock / Unlock"><span id="lockIcon">🔓</span></button>

      <!-- Shown only when unlocked -->
      <div id="toolbar" class="hidden">
        <span class="grip">⠿ drag to move</span>
        <div class="group">
          <button data-cmd="zoom-out" title="Smaller">−</button>
          <span id="scaleLabel">100%</span>
          <button data-cmd="zoom-in" title="Bigger">+</button>
        </div>
      </div>

      <div id="keyboard"><!-- built by renderer.js --></div>
    </div>
    <script src="renderer.js"></script>
  </body>
</html>
